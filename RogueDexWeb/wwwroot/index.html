<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RogueDexWeb</title>
    <!--<base href="/RogueDexWeb/" /> cant have a base url or github pages wont work-->
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="RogueDexWeb.styles.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js" integrity="sha512-E8QSvWZ0eCLGk4km3hxSsNmGWbLtSCSUcewDQPQWZF6pEU8GlT8a5fF32wOl1i8ftdMhssTrF/OhyGWwonTcXA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script type="importmap"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <link href="https://cdn.datatables.net/v/dt/jq-3.7.0/dt-2.3.7/cr-2.1.2/cc-1.2.1/fc-5.0.5/fh-4.0.6/r-3.0.8/datatables.min.css" rel="stylesheet" integrity="sha384-p957VW3Iq7cioGIFCD9N4ACAZXkVxHvIR+8ZuaL4YJpMFHsrMfO8lw/8NHvdLIuj" crossorigin="anonymous">
    <script src="https://cdn.datatables.net/v/dt/jq-3.7.0/dt-2.3.7/cr-2.1.2/cc-1.2.1/fc-5.0.5/fh-4.0.6/r-3.0.8/datatables.min.js" integrity="sha384-h5mRb+WgXAW/X2u2KxXH1l8mOYjYsb23LcDYRlTJhps11KTauhEGdGKtcaRZlTmA" crossorigin="anonymous"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script src="LocalStorage.js"></script>
    <script>
        function DataTablesAdd(table) {
            $(document).ready(function () {
                $(table).DataTable({
                    paging: false,
                    searching: false,
                    fixedHeader: {
                        headerOffset: $('#topnavbar').outerHeight(),
                    },
                    initComplete: function () {
                        this.api()
                            .columns()
                            .every(function () {
                                let column = this;
                                let title = column.footer().textContent;

                                // Create input element
                                let input = document.createElement('input');
                                input.style.width = "100%";
                                input.style.minWidth = "30px";
                                input.placeholder = title;
                                column.footer().replaceChildren(input);

                                // Event listener for user input
                                input.addEventListener('keyup', () => {
                                    if (column.search() !== this.value) {
                                        column.search(input.value).draw();
                                    }
                                });

                                $('#fulldextable tfoot tr').appendTo('#fulldextable thead');
                            });
                    }
                });
            });
        }

        function DataTablesRemove(table) {
            $(document).ready(function () {
                $(table).DataTable().destroy();
            });
        }
    </script>
</body>

</html>
